<svg viewBox="0 0 1540 360" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <clipPath id="rp"><rect x="2" y="2" width="1536" height="356" rx="26"/></clipPath>
  </defs>
  <g clip-path="url(#rp)"><rect x="2" y="2" width="1536" height="356" fill="#F6F6FA"/></g>
  <rect x="2" y="2" width="1536" height="356" rx="26" fill="none" stroke="#E7E7EE" stroke-width="2"/>

  <!-- header -->
  <text x="60" y="58" fill="#6B5CFF" font-size="14" font-weight="700" letter-spacing="3">THE METHOD</text>
  <text x="60" y="90" fill="#1B1C1E" font-size="25" font-weight="700">Seven measured steps — from screenshot to shipped</text>

  <!-- connecting line -->
  <line x1="110" y1="210" x2="1430" y2="210" stroke="#DCDCE4" stroke-width="3"/>

  <!-- chevrons between nodes -->
  <g fill="none" stroke="#C4C4D0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M216 203 l7 7 l-7 7"/>
    <path d="M436 203 l7 7 l-7 7"/>
    <path d="M656 203 l7 7 l-7 7"/>
    <path d="M876 203 l7 7 l-7 7"/>
    <path d="M1096 203 l7 7 l-7 7"/>
    <path d="M1316 203 l7 7 l-7 7"/>
  </g>

  <!-- nodes -->
  <!-- 1 Capture -->
  <g>
    <circle cx="110" cy="210" r="30" fill="#FFFFFF" stroke="#6B5CFF" stroke-width="2.2"/>
    <text x="110" y="219" fill="#6B5CFF" font-size="22" font-weight="700" text-anchor="middle">1</text>
    <text x="110" y="278" fill="#1B1C1E" font-size="16" font-weight="700" text-anchor="middle">Capture</text>
    <text x="110" y="300" fill="#9A9AA2" font-size="12.5" font-weight="500" text-anchor="middle">references</text>
  </g>
  <!-- 2 Measure -->
  <g>
    <circle cx="330" cy="210" r="30" fill="#6B5CFF"/>
    <text x="330" y="219" fill="#FFFFFF" font-size="22" font-weight="700" text-anchor="middle">2</text>
    <text x="330" y="278" fill="#1B1C1E" font-size="16" font-weight="700" text-anchor="middle">Measure</text>
    <text x="330" y="300" fill="#9A9AA2" font-size="12.5" font-weight="500" text-anchor="middle">pixels, not vibes</text>
  </g>
  <!-- 3 Distill -->
  <g>
    <circle cx="550" cy="210" r="30" fill="#FFFFFF" stroke="#6B5CFF" stroke-width="2.2"/>
    <text x="550" y="219" fill="#6B5CFF" font-size="22" font-weight="700" text-anchor="middle">3</text>
    <text x="550" y="278" fill="#1B1C1E" font-size="16" font-weight="700" text-anchor="middle">Distill</text>
    <text x="550" y="300" fill="#9A9AA2" font-size="12.5" font-weight="500" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">REFERENCE.md</text>
  </g>
  <!-- 4 Tokenize -->
  <g>
    <circle cx="770" cy="210" r="30" fill="#FFFFFF" stroke="#6B5CFF" stroke-width="2.2"/>
    <text x="770" y="219" fill="#6B5CFF" font-size="22" font-weight="700" text-anchor="middle">4</text>
    <text x="770" y="278" fill="#1B1C1E" font-size="16" font-weight="700" text-anchor="middle">Tokenize</text>
    <text x="770" y="300" fill="#9A9AA2" font-size="12.5" font-weight="500" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">tokens.css</text>
  </g>
  <!-- 5 Lab -->
  <g>
    <circle cx="990" cy="210" r="30" fill="#FFFFFF" stroke="#6B5CFF" stroke-width="2.2"/>
    <text x="990" y="219" fill="#6B5CFF" font-size="22" font-weight="700" text-anchor="middle">5</text>
    <text x="990" y="278" fill="#1B1C1E" font-size="16" font-weight="700" text-anchor="middle">Lab</text>
    <text x="990" y="300" fill="#9A9AA2" font-size="12.5" font-weight="500" text-anchor="middle">1:1 replica</text>
  </g>
  <!-- 6 Verify -->
  <g>
    <circle cx="1210" cy="210" r="30" fill="#FFFFFF" stroke="#2FB79A" stroke-width="2.2"/>
    <text x="1210" y="219" fill="#1E7A66" font-size="22" font-weight="700" text-anchor="middle">6</text>
    <text x="1210" y="278" fill="#1B1C1E" font-size="16" font-weight="700" text-anchor="middle">Verify</text>
    <text x="1210" y="300" fill="#9A9AA2" font-size="12.5" font-weight="500" text-anchor="middle">Δ within 1–3px</text>
  </g>
  <!-- 7 Record -->
  <g>
    <circle cx="1430" cy="210" r="30" fill="#FFFFFF" stroke="#6B5CFF" stroke-width="2.2"/>
    <text x="1430" y="219" fill="#6B5CFF" font-size="22" font-weight="700" text-anchor="middle">7</text>
    <text x="1430" y="278" fill="#1B1C1E" font-size="16" font-weight="700" text-anchor="middle">Record</text>
    <text x="1430" y="300" fill="#9A9AA2" font-size="12.5" font-weight="500" text-anchor="middle">ADR</text>
  </g>
</svg>
